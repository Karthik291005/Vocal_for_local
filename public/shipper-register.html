<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Delivery Partner Registration — Vocal for Local</title>

<link rel="stylesheet" href="shared.css">

<style>

.register-layout{
min-height:calc(100vh - 62px);
display:grid;
grid-template-columns:380px 1fr;
}

/* LEFT PANEL */

.reg-left{
background:linear-gradient(160deg,#0E1C08,#1A3010,#0E1C08);
padding:3rem 2.5rem;
display:flex;
flex-direction:column;
justify-content:center;
color:white;
}

.reg-brand{
font-family:'Playfair Display',serif;
font-size:1.2rem;
font-weight:900;
margin-bottom:2rem;
}

.reg-brand em{
color:var(--green);
font-style:normal;
}

.reg-left-title{
font-family:'Playfair Display',serif;
font-size:1.8rem;
margin-bottom:0.7rem;
}

.reg-left-sub{
font-size:0.85rem;
color:rgba(255,255,255,0.45);
line-height:1.6;
}

/* RIGHT PANEL */

.reg-right{
background:var(--cream);
padding:3rem;
}

.reg-title{
font-family:'Playfair Display',serif;
font-size:1.9rem;
font-weight:900;
margin-bottom:0.4rem;
}

.reg-subtitle{
font-size:0.85rem;
color:var(--muted);
margin-bottom:2rem;
}

.form-group{
margin-bottom:1.1rem;
}

.form-group label{
display:block;
font-size:0.78rem;
margin-bottom:0.3rem;
font-weight:600;
}

.form-group input,
.form-group select{
width:100%;
padding:0.6rem;
border:1px solid var(--border);
border-radius:6px;
font-size:0.85rem;
}

.register-btn{
background:var(--forest);
color:white;
border:none;
padding:0.7rem 1.4rem;
border-radius:6px;
cursor:pointer;
font-weight:700;
margin-top:1rem;
}

.register-btn:hover{
background:#1f3a10;
}

.reg-link {
    text-align: left;
    margin-left: 0.5vw;
    margin-top: 1.5rem;
    font-size: 0.85rem;
    color: var(--muted);
}

.reg-link a {
    color: var(--forest);
    font-weight: 700;
    text-decoration: none;
}

</style>

</head>

<body>

<div class="register-layout">

<!-- LEFT PANEL -->

<div class="reg-left">

<div class="reg-brand">Vocal <em>for Local</em></div>

<div class="reg-left-title">
Become a Delivery Partner 🚚
</div>

<div class="reg-left-sub">
Join our logistics network and help deliver authentic handmade products
from local artisans directly to buyers.
</div>

</div>


<!-- RIGHT PANEL -->

<div class="reg-right">
<button class="back-btn" onclick="window.location.href='/'">← Back to Home</button>

<div class="reg-title">Delivery Partner Registration</div>

<div class="reg-subtitle">
Fill the details to join the logistics network
</div>

<form id="shipperForm">

<div class="form-group">
<label>Full Name</label>
<input type="text" id="name" required>
</div>

<div class="form-group">
<label>Email</label>
<input type="email" id="email" required>
</div>

<div class="form-group">
<label>Password</label>
<input type="password" id="password" required>
</div>

<div class="form-group">
<label>Phone Number</label>
<input type="text" id="phone" required>
</div>

<div class="form-group">
<label>Vehicle Type</label>
<select id="vehicle">
<option>Bike</option>
<option>Scooter</option>
<option>Van</option>
<option>Truck</option>
</select>
</div>

<div class="form-group">
<label>Service Location</label>
<input type="text" id="location" placeholder="e.g. Visakhapatnam">
</div>

<button type="submit" class="register-btn">
Register as Delivery Partner
</button>

<div class="reg-link">
Existing delivery partner? <a href="/shipper-login">Login →</a>
</div>

</form>

</div>

</div>

<script>
document.getElementById("shipperForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const data = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value,
        role: "shipper"
    };

    const response = await fetch("http://localhost:5000/api/auth/register", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(data)
    });

    if (response.ok) {
        alert("Registration Successful! Please Login.");
        window.location.href = "/shipper-login";
    } else {
        const error = await response.json();
        alert(error.message);
    }
});
</script>

</body>
</html>
