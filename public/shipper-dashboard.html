<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Delivery Partner Dashboard — Vocal for Local</title>
    <link rel="stylesheet" href="shared.css">

    <style>
        .shipper-nav {
            position: sticky;
            top: 0;
            background: #0E1C08;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 2rem;
            color: white;
        }

        .shipper-logo {
            font-family: 'Playfair Display', serif;
            font-weight: 900;
            font-size: 1.1rem;
        }

        .shipper-logo em {
            color: var(--green);
            font-style: normal;
        }

        .shipper-body {
            max-width: 1200px;
            margin: auto;
            padding: 2rem;
        }

        .shipper-card {
            background: white;
            border: 1px solid #D8EFC9;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .shipper-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            margin-bottom: 1rem;
        }

        .pick-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
        }

        .pick-table th {
            background: #0E1C08;
            color: white;
            padding: 0.7rem;
            text-align: left;
            font-size: 0.75rem;
        }

        .pick-table td {
            padding: 0.7rem;
            border-bottom: 1px solid #E8F2DA;
        }

        .pick-table tr:hover td {
            background: #F5FBF0;
        }

        .pick-btn {
            background: #2D5016;
            color: white;
            border: none;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8rem;
            margin-right: 4px;
        }

        .pick-btn:hover {
            background: #4A8A1A;
        }

        .scan-box {
            margin-top: 1rem;
            padding: 1rem;
            background: #F0FBE8;
            border: 1px solid #9CC56A;
            border-radius: 6px;
        }

        input {
            padding: 0.5rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-top: 0.5rem;
            width: 220px;
        }

        .status-picked {
            color: green;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <nav class="shipper-nav">
        <div class="shipper-logo">
            Vocal <em>for Local</em>
            <span style="font-size:0.7rem;color:#aaa">Delivery Panel</span>
        </div>
        <div>🚚 Delivery Partner</div>
    </nav>

    <div class="shipper-body">

        <div class="shipper-card">

            <div class="shipper-card-title">📦 Packages Ready for Pickup</div>

            <table class="pick-table">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>Product</th>
                        <th>Seller</th>
                        <th>Location</th>
                        <th>Status</th>
                        <th>Action</th>
                    </tr>
                </thead>

                <tbody id="pickup-list"></tbody>

            </table>

        </div>

        <div id="scan-area"></div>

    </div>

   <script src="shared.js"></script>
<script>
    function renderOrders() {
    // 1. Load global orders
    const allOrders = JSON.parse(localStorage.getItem('all_orders') || '[]');
    
    // 2. Filter for orders that are Shipped, Picked Up, or already Delivered
    const relevantOrders = allOrders.filter(o => o.status === 'shipped' || o.status === 'Picked Up' || o.status === 'Delivered');

    let table = document.getElementById("pickup-list");

    if (relevantOrders.length === 0) {
        table.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:2rem;">No active delivery tasks.</td></tr>';
        return;
    }

    table.innerHTML = relevantOrders.map(o => {
        const status = o.status || 'shipped';
        
        // Logic to determine which button to show based on status
        let actionButton = '';
        if (status === 'shipped') {
            actionButton = `<button class="pick-btn" onclick="manualEntry('${o.id}')">⌨ Pickup</button>`;
        } else if (status === 'Picked Up') {
            // CHANGED: Added "Deliver" button for picked up items
            actionButton = `<button class="pick-btn" style="background:#E8872A" onclick="promptDelivery('${o.id}')">🏁 Deliver</button>`;
        } else {
            actionButton = `<span style="color:green; font-weight:bold">✓ Delivered</span>`;
        }

        return `
            <tr>
                <td><strong>${o.id}</strong></td>
                <td>${o.productName}</td>
                <td>${o.artisan}</td>
                <td>${o.buyerAddr}</td>
                <td>
                    <span class="status-${status.toLowerCase().replace(' ', '')}">
                        ${status === 'shipped' ? '📦 Ready for Pickup' : status}
                    </span>
                </td>
                <td>${actionButton}</td>
            </tr>`;
    }).join("");
}

// Existing Pickup Logic
function manualEntry(orderId) {
    document.getElementById("scan-area").innerHTML = `
        <div class="scan-box">
            <h4>⌨ Manual Order Verification</h4>
            <p>Enter Order ID to confirm collection from artisan.</p>
            <input type="text" id="qr-input" placeholder="Enter Order ID">
            <br><br>
            <button class="pick-btn" onclick="verifyOrder('${orderId}')">✔ Confirm Pickup</button>
        </div>`;
}

// CHANGED: Added Delivery OTP Prompt
function promptDelivery(orderId) {
    document.getElementById("scan-area").innerHTML = `
        <div class="scan-box" style="border-color: #E8872A; background: #FFF9F0;">
            <h4>🏁 Complete Delivery</h4>
            <p>Ask the buyer for their 4-digit Delivery OTP (found in their "My Orders" page).</p>
            <input type="number" id="otp-input" placeholder="Enter 4-digit OTP">
            <br><br>
            <button class="pick-btn" style="background:#E8872A" onclick="verifyDelivery('${orderId}')">
                Confirm & Mark Delivered
            </button>
        </div>`;
}

// CHANGED: Added OTP Verification Logic
function verifyDelivery(orderId) {
    const enteredOtp = document.getElementById("otp-input").value.trim();
    let allOrders = JSON.parse(localStorage.getItem('all_orders') || '[]');
    const idx = allOrders.findIndex(o => o.id === orderId);

    if (idx > -1) {
        if (enteredOtp == allOrders[idx].deliveryCode) {
            // Change status to Delivered
            allOrders[idx].status = 'Delivered'; 
            localStorage.setItem('all_orders', JSON.stringify(allOrders));
            
            alert("✅ Delivery Confirmed!");
            document.getElementById("scan-area").innerHTML = "";
            renderOrders();
        } else {
            alert("❌ Incorrect OTP!");
        }
    }
}

// --- Inside shipper-dashboard.html ---

function handleScanResult(scannedData) {
    try {
        // 1. Parse the JSON data encoded in the buyer's QR code
        const data = JSON.parse(scannedData); 
        
        // 2. Display the verification area with the product image
        document.getElementById("scan-area").innerHTML = `
            <div class="scan-box" style="text-align:center; border: 2px solid var(--saffron); background: #fffaf4; padding: 1.5rem; border-radius: 1rem;">
                <h4>📦 Item Verified</h4>
                <img src="${data.image}" width="150" style="border-radius:8px; margin: 15px 0; border: 1px solid var(--border);">
                <p style="font-size: 1.1rem;"><strong>${data.name}</strong></p>
                <p class="meta-text">Order ID: ${data.id}</p>
                
                <hr style="margin: 1.5rem 0; border: 0; border-top: 1px solid var(--border);">
                
                <p style="font-size: 0.85rem; color: var(--muted); margin-bottom: 0.5rem;">Ask buyer for 4-digit OTP</p>
                <input type="number" id="otp-input" placeholder="Enter Delivery OTP" 
                       style="width: 100%; padding: 0.8rem; border: 1px solid var(--border); border-radius: 0.5rem; margin-bottom: 1rem; text-align: center; font-size: 1.2rem; letter-spacing: 0.5rem;">
                
                <button class="pick-btn" style="width: 100%; background: var(--saffron);" 
                        onclick="verifyDelivery('${data.id}')">
                    Complete Delivery
                </button>
            </div>`;
    } catch (e) {
        console.error("Scan Error:", e);
        alert("Invalid QR Code. Please scan the code from the Buyer's 'Confirmation' or 'My Orders' page.");
    }
}

// Reuse your existing verifyOrder for pickups
function verifyOrder(orderId) {
    let enteredId = document.getElementById("qr-input").value.trim();
    if (enteredId === orderId) {
        let allOrders = JSON.parse(localStorage.getItem('all_orders') || '[]');
        const idx = allOrders.findIndex(o => o.id === orderId);
        if (idx > -1) {
            allOrders[idx].status = 'Picked Up';
            localStorage.setItem('all_orders', JSON.stringify(allOrders));
            alert("✅ Pickup Confirmed!");
            document.getElementById("scan-area").innerHTML = "";
            renderOrders();
        }
    } else {
        alert("❌ Order ID does not match.");
    }
}

renderOrders();
</script>

</body>

</html>
